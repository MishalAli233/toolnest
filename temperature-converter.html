<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:450px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<h1>🌡️ Temperature Converter</h1>

<input type="number" id="temp" placeholder="Enter Temperature">

<select id="type">
<option value="cf">Celsius → Fahrenheit</option>
<option value="fc">Fahrenheit → Celsius</option>
<option value="ck">Celsius → Kelvin</option>
<option value="kc">Kelvin → Celsius</option>
</select>

<button onclick="convertTemp()">Convert</button>

<div id="result" class="result"></div>

<div class="footer">
© 2026 ToolNest
</div>

</div>

<script>
function convertTemp(){

let temp=parseFloat(document.getElementById("temp").value);
let type=document.getElementById("type").value;

if(isNaN(temp)){
document.getElementById("result").innerHTML="Please enter a value.";
return;
}

let result;

if(type=="cf") result=(temp*9/5)+32;
if(type=="fc") result=(temp-32)*5/9;
if(type=="ck") result=temp+273.15;
if(type=="kc") result=temp-273.15;

document.getElementById("result").innerHTML="Result: "+result.toFixed(2);

}
</script>

</body>
</html>
