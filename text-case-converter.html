<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:550px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
resize:vertical;
margin-bottom:15px;
}

button{
padding:12px 18px;
margin:5px;
font-size:16px;
background:#007bff;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<h1>🔤 Text Case Converter</h1>

<textarea id="text" placeholder="Enter your text here..."></textarea>

<button onclick="toUpper()">UPPERCASE</button>
<button onclick="toLower()">lowercase</button>
<button onclick="toTitle()">Title Case</button>

<div class="footer">
© 2026 ToolNest
</div>

</div>

<script>
function toUpper(){
document.getElementById("text").value =
document.getElementById("text").value.toUpperCase();
}

function toLower(){
document.getElementById("text").value =
document.getElementById("text").value.toLowerCase();
}

function toTitle(){
let text=document.getElementById("text").value.toLowerCase().split(" ");
for(let i=0;i<text.length;i++){
if(text[i]){
text[i]=text[i][0].toUpperCase()+text[i].substring(1);
}
}
document.getElementById("text").value=text.join(" ");
}
</script>

</body>
</html>
