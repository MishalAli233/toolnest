<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:420px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

input{
width:100%;
padding:14px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#6f42c1;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#5a32a3;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
word-break:break-all;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Password Generator</h1>

<input type="number" id="length" placeholder="Password Length (e.g. 12)" value="12" min="4" max="50">

<button onclick="generatePassword()">
Generate Password
</button>

<div class="result" id="result"></div>

<script>function generatePassword(){

let length=parseInt(document.getElementById("length").value);

if(isNaN(length) || length<4 || length>50){
document.getElementById("result").innerHTML=
"⚠️ Enter a length between 4 and 50.";
return;
}

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}<>?";

let password="";

for(let i=0;i<length;i++){
password+=chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("result").innerHTML=
`<b>${password}</b>`;
}</script>

</div>

</body>
</html>
