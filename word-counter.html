<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:500px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
resize:vertical;
}

button{
margin-top:15px;
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
line-height:1.8;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}
</style>

</head>

<body>

<div class="container">

<h1>📝 Word Counter</h1>

<textarea id="text" placeholder="Type or paste your text here..."></textarea>

<button onclick="countWords()">Count</button>

<div class="result" id="result">
Words: 0<br>
Characters: 0
</div>

<div class="footer">
© 2026 ToolNest
</div>

</div>

<script>
function countWords(){

let text=document.getElementById("text").value;

let words=text.trim()==""?0:text.trim().split(/\s+/).length;

let characters=text.length;

document.getElementById("result").innerHTML=
"Words: "+words+"<br>Characters: "+characters;

}
</script>

</body>
</html>
