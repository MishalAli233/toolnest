<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electricity Bill Calculator | ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:450px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
line-height:1.6;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ Electricity Bill Calculator</h1>

<input type="number" id="units" placeholder="Enter Units Used">

<input type="number" id="price" placeholder="Price Per Unit">

<button onclick="calculateBill()">Calculate Bill</button>

<div id="result" class="result"></div>

<div class="footer">
© 2026 ToolNest
</div>

</div>


<script>

function calculateBill(){

let units=parseFloat(document.getElementById("units").value);
let price=parseFloat(document.getElementById("price").value);

if(isNaN(units) || isNaN(price)){
document.getElementById("result").innerHTML="⚠️ Please enter values";
return;
}

let bill=units*price;

document.getElementById("result").innerHTML=
"Total Bill: "+bill.toFixed(2);

}

</script>

</body>
</html>
