<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:420px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

select,input{
width:100%;
padding:14px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>📏 Unit Converter</h1>

<select id="type">
<option value="mcm">Meter → Centimeter</option>
<option value="cmm">Centimeter → Meter</option>
<option value="kgg">Kilogram → Gram</option>
<option value="gkg">Gram → Kilogram</option>
</select>

<input type="number" id="value" placeholder="Enter Value">

<button onclick="convertUnit()">
Convert
</button>

<div class="result" id="result"></div>

<script>function convertUnit(){

let type=document.getElementById("type").value;
let value=parseFloat(document.getElementById("value").value);

if(isNaN(value)){
document.getElementById("result").innerHTML=
"⚠️ Please enter a valid value.";
return;
}

let result=0;
let unit="";

switch(type){

case "mcm":
result=value*100;
unit="cm";
break;

case "cmm":
result=value/100;
unit="m";
break;

case "kgg":
result=value*1000;
unit="g";
break;

case "gkg":
result=value/1000;
unit="kg";
break;

}

document.getElementById("result").innerHTML=
`${result} ${unit}`;function convertUnit(){
