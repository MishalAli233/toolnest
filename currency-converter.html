<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Currency Converter | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:420px;
text-align:center;
}

h1{
color:#222;
margin-bottom:20px;
}

p{
color:#666;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid #ddd;
border-radius:10px;
font-size:18px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#222;
line-height:1.6;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}
</style>

</head>

<body>

<div class="container">

<h1>💱 Currency Converter</h1>

<p>Convert Currency to Pakistani Rupees</p>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="currency">
<option value="USD">🇺🇸 US Dollar (USD)</option>
<option value="EUR">🇪🇺 Euro (EUR)</option>
<option value="GBP">🇬🇧 British Pound (GBP)</option>
<option value="AED">🇦🇪 UAE Dirham (AED)</option>
</select>

<button onclick="convertCurrency()">
Convert
</button>

<div id="result" class="result"></div>

<div class="footer">
© 2026 ToolNest
</div>

</div>

<script>function convertCurrency(){

let amount = document.getElementById("amount").value;
let currency = document.getElementById("currency").value;

if(amount==""){
document.getElementById("result").innerHTML="⚠️ Please enter an amount.";
return;
}

let rate = 0;

switch(currency){
case "USD":
rate = 285;
break;

case "EUR":
rate = 335;
break;

case "GBP":
rate = 390;
break;

case "AED":
rate = 78;
break;
}

let total = amount * rate;

document.getElementById("result").innerHTML =
`${amount} ${currency}<br> = <br><b>${total.toFixed(2)} PKR</b>`;

}</script>

</body>
</html>
