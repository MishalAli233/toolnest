<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator | ToolNest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:420px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
border:2px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#28a745;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

<h1>⚖️ BMI Calculator</h1>

<input type="number" id="weight" placeholder="Weight (kg)">

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateBMI()">
Calculate BMI
</button>

<div class="result" id="result"></div>

<script>function calculateBMI(){

let weight=parseFloat(document.getElementById("weight").value);
let height=parseFloat(document.getElementById("height").value)/100;

if(!weight || !height){
document.getElementById("result").innerHTML="⚠️ Please enter weight and height.";
return;
}

let bmi=weight/(height*height);
let status="";

if(bmi<18.5){
status="🟡 Underweight";
}
else if(bmi<25){
status="🟢 Normal Weight";
}
else if(bmi<30){
status="🟠 Overweight";
}
else{
status="🔴 Obese";
}

document.getElementById("result").innerHTML=
`Your BMI: <b>${bmi.toFixed(1)}</b><br>${status}`;
}</script>

</div>

</body>
</html>
