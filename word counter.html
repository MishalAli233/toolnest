<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | ToolNest</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:18px;
border-radius:10px;
border:2px solid #ddd;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>📝 Word Counter</h1>

<textarea id="text" placeholder="Write your text here..." oninput="countWords()"></textarea>

<div class="result" id="result">
Words: 0 <br>
Characters: 0
</div>

</div>

<script>

function countWords(){

let text=document.getElementById("text").value;

let words=text.trim()=="" ? 0 : text.trim().split(/\s+/).length;

let characters=text.length;

document.getElementById("result").innerHTML=
"Words: "+words+"<br>Characters: "+characters;

}

</script>

</body>
</html>
