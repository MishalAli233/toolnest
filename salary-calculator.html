<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Calculator | ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:100%;
max-width:450px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#222;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:21px;
font-weight:bold;
line-height:1.6;
}

.footer{
margin-top:30px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>💵 Salary Calculator</h1>

<input type="number" id="salary" placeholder="Monthly Salary">

<input type="number" id="bonus" placeholder="Bonus">

<input type="number" id="tax" placeholder="Tax (%)">

<button onclick="calculateSalary()">Calculate</button>

<div id="result" class="result"></div>

<div class="footer">
© 2026 ToolNest
</div>

</div>


<script>

function calculateSalary(){

let salary=parseFloat(document.getElementById("salary").value);
let bonus=parseFloat(document.getElementById("bonus").value)||0;
let tax=parseFloat(document.getElementById("tax").value)||0;

if(isNaN(salary)){
document.getElementById("result").innerHTML="⚠️ Enter salary";
return;
}

let total=salary+bonus;
let taxAmount=(total*tax)/100;
let finalSalary=total-taxAmount;

document.getElementById("result").innerHTML=
"Gross Salary: "+total.toFixed(2)+"<br>"+
"After Tax: "+finalSalary.toFixed(2);

}

</script>

</body>
</html>
